{% extends "base.html" %}
{% block content %}
<style>
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:24px; margin-bottom:16px; display:none; box-shadow:var(--shadow-sm); }
.card.on { display:block; animation:slide-up .3s cubic-bezier(.22,1,.36,1); }
.card h3 { font-size:14px; font-weight:600; color:var(--text); margin-bottom:14px; }
.card textarea { width:100%; min-height:100px; font-family:var(--font-mono); font-size:12px; }
.card .hint { font-size:11px; color:var(--text-muted); margin-top:4px; }
.card .act { margin-top:14px; display:flex; gap:8px; }
</style>

<div class="page-header"><h1>源管理</h1></div>
<div id="list"></div>

<div class="card" id="cfg-panel">
  <h3 id="cfg-title"></h3>
  <div id="cfg-body"></div>
  <div class="act">
    <button class="btn btn-primary btn-sm" onclick="saveCfg()">保存</button>
    <button class="btn btn-ghost btn-sm" onclick="document.getElementById('cfg-panel').classList.remove('on')">取消</button>
  </div>
</div>

<script>
const $=id=>document.getElementById(id)
let _srcs=[]

async function load() {
  const r=await fetch('/api/sources');_srcs=await r.json()
  $('list').innerHTML=`<table>
    <thead><tr><th>KEY</th><th>名称</th><th>版本</th><th>域名</th><th>操作</th></tr></thead>
    <tbody>${_srcs.map(s=>`<tr>
      <td style="font-family:var(--font-mono);font-size:12px;color:var(--gold)">${s.key}</td>
      <td style="font-weight:500">${s.name}</td><td>${s.version}</td><td>${s.domains.join(', ')}</td>
      <td>${s.config.length?`<button class="btn btn-ghost btn-xs" onclick="openCfg('${s.key}')">配置</button>`:'—'}</td>
    </tr>`).join('')}</tbody></table>`
}

async function openCfg(key) {
  const s=_srcs.find(x=>x.key===key); if(!s)return
  $('cfg-title').textContent='配置 — '+s.name
  $('cfg-panel').dataset.key=key

  // 加载配置 JSON
  let vals={}
  try { const r=await fetch('/api/sources/'+key+'/config'); vals=await r.json() } catch(_){}

  // 根据 schema 渲染
  let html=''
  for (const f of s.config) {
    html += `<div style="margin-bottom:12px"><label style="font-size:12px;color:var(--text-muted)">${f.label}</label>`
    if (f.type==='textarea') {
      html += `<textarea id="cfg-${f.key}" placeholder="${f.placeholder||''}">${vals[f.key]||''}</textarea>`
    } else {
      html += `<input id="cfg-${f.key}" type="${f.type||'text'}" placeholder="${f.placeholder||''}" value="${vals[f.key]||''}" style="width:100%;margin-top:4px">`
    }
    if (f.hint) html += `<div class="hint">${f.hint}</div>`
    html += '</div>'
  }
  $('cfg-body').innerHTML=html
  $('cfg-panel').classList.add('on')
}

async function saveCfg() {
  const key=$('cfg-panel').dataset.key
  const s=_srcs.find(x=>x.key===key); if(!s)return
  const cfg={}
  for (const f of s.config) {
    const el=document.getElementById('cfg-'+f.key)
    if (!el) continue
    cfg[f.key] = el.value||''
  }
  await fetch('/api/sources/'+key+'/config',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(cfg)})
  $('cfg-panel').classList.remove('on')
}
load()
</script>
{% endblock %}
