{% extends "base.html" %}
{% block content %}
<style>
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem; margin-bottom: 1rem; }
    .card h3 { margin:0 0 0.5rem; font-size:0.95rem; color:#e8e0d5; }
    table { width:100%; border-collapse:collapse; }
    th { text-align:left; padding:0.45rem 0.6rem; font-size:0.7rem; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-dim); border-bottom:1px solid var(--border); }
    td { padding:0.55rem 0.6rem; border-bottom:1px solid var(--border); font-size:0.85rem; }
    .btn { padding:0.35rem 0.75rem; border:none; border-radius:5px; cursor:pointer; font-size:0.8rem; }
    .btn-primary { background:var(--teal); color:#fff; }
    .btn-sm { font-size:0.72rem; padding:0.2rem 0.5rem; }
    textarea { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:5px; padding:0.5rem; font-family:monospace; font-size:0.82rem; }
</style>
<h2 style="font-size:1.3rem;color:#e8e0d5;margin-bottom:1rem">源管理</h2>
<div id="list"><p style="color:var(--text-dim)">加载中...</p></div>
<div id="cred-form" class="card" style="display:none">
    <h3>配置凭证: <span id="cred-source" style="color:var(--teal)"></span></h3>
    <div id="cred-inputs"></div>
    <button class="btn btn-primary" onclick="saveCreds()" style="margin-right:0.5rem">保存</button>
    <button class="btn" style="background:transparent;color:var(--text);border:1px solid var(--border);border-radius:5px;padding:0.35rem 0.75rem;cursor:pointer;font-size:0.8rem" onclick="document.getElementById('cred-form').style.display='none'">取消</button>
</div>
<script>
async function load() {
    const r = await fetch('/api/sources')
    const srcs = await r.json()
    document.getElementById('list').innerHTML = '<table>' +
        '<tr><th>Key</th><th>名称</th><th>版本</th><th>域名</th><th>认证方式</th><th>操作</th></tr>' +
        srcs.map(s => `<tr>
            <td style="color:var(--teal);font-family:monospace">${s.key}</td><td>${s.name}</td><td>${s.version}</td>
            <td>${s.domains.join(', ')}</td><td>${s.auth_schema}</td>
            <td>${s.auth_schema !== 'NONE' ? `<button class="btn btn-primary btn-sm" onclick="editCreds('${s.key}','${s.auth_schema}')">凭证</button>` : '-'}</td>
        </tr>`).join('') + '</table>'
}
async function editCreds(key, schema) {
    document.getElementById('cred-source').textContent = key
    document.getElementById('cred-form').dataset.sourceKey = key
    let existing = {}
    try { const r = await fetch('/api/credentials/' + key); const data = await r.json(); existing = data.credentials || {} } catch(e) {}
    if (schema === 'COOKIE') {
        document.getElementById('cred-inputs').innerHTML = '<p style="font-size:0.78rem;color:var(--text-dim);margin-bottom:0.3rem">每行 key=value:</p><textarea id="cookie-text" rows="6"></textarea>'
        setTimeout(() => document.getElementById('cookie-text').value = Object.entries(existing).map(([k,v]) => `${k}=${v}`).join('\n'), 50)
    } else {
        document.getElementById('cred-inputs').innerHTML = Object.entries(existing).map(([k,v]) =>
            `<p style="margin-bottom:0.4rem">${k}: <input value="${v}" style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:0.3rem 0.5rem;border-radius:4px;width:100%"></p>`).join('')
    }
    document.getElementById('cred-form').style.display = 'block'
}
async function saveCreds() {
    const key = document.getElementById('cred-form').dataset.sourceKey
    let creds = {}
    const ta = document.getElementById('cookie-text')
    if (ta) { ta.value.split('\n').filter(l=>l.includes('=')).forEach(l=>{const [k,...v]=l.split('=');creds[k.trim()]=v.join('=').trim()}) }
    await fetch('/api/credentials/' + key, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({credentials:creds})})
    document.getElementById('cred-form').style.display = 'none'
}
load()
</script>
{% endblock %}
