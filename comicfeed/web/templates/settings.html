{% extends "base.html" %}
{% block content %}
<style>
.section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; margin-bottom: 20px; box-shadow: var(--shadow-sm); }
.section h2 { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.field { margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
.field label { font-size: 12px; color: var(--text-muted); width: 100px; text-align: right; flex-shrink: 0; }
.field input { flex: 1; max-width: 320px; }
.row { display: flex; gap: 12px; }
.row .field { flex: 1; }
.row .field label { width: auto; text-align: left; }
.row .field input { max-width: 320px; }
.sub { margin-left: 60px; }
.sub .field label { width: auto; text-align: right; min-width: 80px; }
.sub h3 { font-size: 12px; color: var(--text-muted); margin: 14px 0 8px -60px; font-weight: 500; }
</style>

<div class="page-header"><h1>全局设置</h1></div>

<div class="section">
  <h2>基础</h2>
  <div class="sub">
    <div class="field"><label>下载路径</label><input id="download_path" placeholder="留空=当前目录"></div>
    <div class="field"><label>巡检间隔 (分钟)</label><input id="check_interval" placeholder="10"></div>
    <div class="field"><label>下载重试次数</label><input id="download_retry" placeholder="3"></div>
    <div class="field"><label>并发数</label><input id="global_concurrency" placeholder="5"></div>
    <div class="field"><label>代理</label><input id="proxy" placeholder="http://localhost:8889"></div>
  </div>
  <div class="sub" style="margin-top:12px">
    <h3>全局搜索条件</h3>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
      <span style="font-size:11px;color:var(--text-muted)">默认条件</span>
      <button class="btn btn-ghost btn-xs" onclick="addSearchRow('defaults')">+ 添加</button>
    </div>
    <div id="search-defaults-rows"></div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;margin-top:12px">
      <span style="font-size:11px;color:var(--text-muted)">排除条件</span>
      <button class="btn btn-ghost btn-xs" onclick="addSearchRow('blocklist')">+ 添加</button>
    </div>
    <div id="search-blocklist-rows"></div>
  </div>
</div>

<div class="section">
  <h2>Komga</h2>
  <div class="sub">
    <div class="field"><label>URL</label><input id="komga_url" placeholder="http://localhost:25600"></div>
    <div class="field"><label>Library ID</label><input id="komga_library_id" placeholder="多个用逗号分隔"></div>
    <div class="row"><div class="field"><label>用户名</label><input id="komga_user"></div><div class="field"><label>密码</label><input id="komga_password" type="password"></div></div>
    <button class="btn btn-ghost btn-sm" onclick="testKomga()">测试连接</button>
  </div>
</div>

<div class="section">
  <h2>通知</h2>
  <div class="sub">
    <h3>Webhook</h3>
    <div class="field"><label>URL</label><input id="webhook_url" placeholder="https://hooks.example.com/notify"><button class="btn btn-ghost btn-sm" onclick="testWebhook()">测试</button></div>

    <h3>邮件 (SMTP)</h3>
    <div class="row">
      <div class="field"><label>主机</label><input id="smtp_host" placeholder="smtp.example.com"></div>
      <div class="field"><label>端口</label><input id="smtp_port" placeholder="587"></div>
    </div>
    <div class="row">
      <div class="field"><label>用户名</label><input id="smtp_user" placeholder="user@example.com"></div>
      <div class="field"><label>密码</label><input id="smtp_password" type="password"></div>
    </div>
    <div class="field"><label>收件人</label><input id="smtp_to" placeholder="me@example.com"></div>
    <button class="btn btn-ghost btn-sm" onclick="testEmail()">发送测试邮件</button>
  </div>
</div>

<div class="section">
  <h2>登录认证</h2>
  <div class="sub">
    <div class="row">
      <div class="field"><label>用户名</label><input id="auth_username"></div>
      <div class="field"><label>密码</label><input id="auth_password" type="password" placeholder="留空=无需认证"></div>
    </div>
  </div>
</div>

<div style="margin-top: 8px">
  <input type="hidden" id="search_defaults"><input type="hidden" id="search_blocklist">
  <button class="btn btn-primary" onclick="saveAll()">保存所有设置</button>
</div>

<script>
async function load() {
  const r = await fetch('/api/settings'); const s = await r.json()
  for (const k of Object.keys(s)) {
    const el = document.getElementById(k)
    if (!el) continue
    if (k==='search_defaults'||k==='search_blocklist') { renderSearchRows(k.replace('search_',''), s[k]); continue }
    el.value = s[k] || ''
  }
}

function addSearchRow(type, val) {
  const div = document.createElement('div'); div.style.cssText='display:flex;gap:6px;align-items:center;margin-bottom:4px'
  const inp = document.createElement('input'); inp.style.cssText='padding:4px 6px;font-size:11px;flex:1;max-width:300px'; inp.value=val||''
  inp.oninput = () => collectSearchRows(type)
  const del = document.createElement('button'); del.textContent='×'; del.className='btn btn-ghost btn-xs'; del.onclick=()=>{div.remove();collectSearchRows(type)}
  div.append(inp, del)
  document.getElementById('search-'+type+'-rows').appendChild(div)
  collectSearchRows(type)
}
function renderSearchRows(type, json) { document.getElementById('search-'+type+'-rows').innerHTML=''; try { JSON.parse(json||'[]').forEach(v => addSearchRow(type, v)) } catch(_){} }
function collectSearchRows(type) { const vals=[]; document.getElementById('search-'+type+'-rows').querySelectorAll('input').forEach(i=>vals.push(i.value)); document.getElementById('search_'+type).value=JSON.stringify(vals.filter(v=>v)) }
function _val(id){return document.getElementById(id)?.value||''}
async function testWebhook() {
  const r = await fetch('/api/settings/test-webhook', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({url:_val('webhook_url')})})
  const data = await r.json()
  alert(data.ok ? 'Webhook 发送成功' : '失败: ' + data.error)
}
async function testKomga() {
  const r = await fetch('/api/settings/test-komga', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({url:_val('komga_url'),user:_val('komga_user'),password:_val('komga_password'),library_ids:_val('komga_library_id')})})
  const data = await r.json()
  if (data.ok) alert(data.warning || data.message || '连接成功')
  else alert('失败: ' + data.error)
}
async function testEmail() {
  const r = await fetch('/api/settings/test-email', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({host:_val('smtp_host'),port:parseInt(_val('smtp_port'))||587,user:_val('smtp_user'),password:_val('smtp_password'),to:_val('smtp_to')})})
  const data = await r.json()
  alert(data.ok ? '测试邮件发送成功' : '失败: ' + data.error)
}
async function saveAll() {
  const r = await fetch('/api/settings'); const s = await r.json()
  const keys = new Set(Object.keys(s))
  document.querySelectorAll('input[id]').forEach(el => keys.add(el.id))
  for (const k of keys) {
    const v = document.getElementById(k)?.value
    if (v !== undefined) await fetch('/api/settings/'+k+'?value='+encodeURIComponent(v||''), {method:'PUT'})
  }
  alert('已保存')
}
load()
</script>
{% endblock %}
