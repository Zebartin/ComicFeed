{% extends "base.html" %}
{% block content %}
<style>.row{display:flex;align-items:center;gap:8px;margin-bottom:10px}.row label{font-size:12px;color:var(--cream-dim);min-width:170px;text-align:right}.row input{flex:1;max-width:400px}</style>
<h1 class="page-title">全局设置</h1>
<div id="list"></div>
<script>
async function load() {
  const r = await fetch('/api/settings'); const s = await r.json()
  document.getElementById('list').innerHTML = Object.entries(s).map(([k,v]) =>
    `<div class="row"><label>${k}</label><input id="${k}" value="${v||''}"><button class="btn btn-primary btn-sm" onclick="save('${k}')">保存</button></div>`
  ).join('')
}
async function save(k) {
  await fetch('/api/settings/'+k+'?value='+encodeURIComponent(document.getElementById(k).value),{method:'PUT'})
}
load()
</script>
{% endblock %}
