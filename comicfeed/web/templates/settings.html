{% extends "base.html" %}
{% block content %}
<style>
.section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; margin-bottom: 20px; box-shadow: var(--shadow-sm); }
.section h2 { font-size: 15px; font-weight: 600; color: var(--text); margin: 0 0 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.section h3 { font-size: 12px; color: var(--text-muted); font-weight: 500; margin: 12px 0 8px; }
.fields { display: grid; grid-template-columns: 120px 1fr; gap: 10px 12px; align-items: center; }
.fields label { font-size: 12px; color: var(--text-muted); text-align: right; }
.fields input { width: 100%; max-width: 400px; }
.fields .desc { font-size: 10px; color: var(--text-muted); grid-column: 2; margin-top: -6px; }
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 12px; grid-column: 1 / -1; }
.row label { text-align: left; font-size: 12px; color: var(--text-muted); }
.row input { max-width: none; }
</style>

<div class="page-header"><h1>全局设置</h1></div>

<div class="section">
  <h2>基础</h2>
  <div class="fields">
    <label>下载路径</label><input id="download_path" placeholder="留空=当前目录">
    <div class="desc">CBZ 文件保存位置</div>
    <label>巡检间隔</label><input id="check_interval" placeholder="10">
    <div class="desc">分钟。全局轮询频率，实际按订阅间隔执行</div>
    <label>并发数</label><input id="global_concurrency" placeholder="5">
    <label>代理</label><input id="proxy" placeholder="http://localhost:8889">
    <div class="desc">全局代理。每源代理在源管理页配置。空=不使用</div>
  </div>
</div>

<div class="section">
  <h2>Komga</h2>
  <div class="fields">
    <label>URL</label><input id="komga_url" placeholder="http://localhost:25600">
    <label>Library ID</label><input id="komga_library_id">
    <label>API Key</label><input id="komga_api_key">
  </div>
</div>

<div class="section">
  <h2>通知</h2>
  <div class="fields">
    <h3 style="grid-column:1/-1;margin-top:0">Webhook</h3>
    <label>URL</label><input id="webhook_url" placeholder="https://hooks.example.com/notify">

    <h3 style="grid-column:1/-1">邮件 SMTP</h3>
    <div class="row">
      <div><label>主机</label><input id="smtp_host" placeholder="smtp.example.com"></div>
      <div><label>端口</label><input id="smtp_port" placeholder="587"></div>
    </div>
    <div class="row">
      <div><label>用户名</label><input id="smtp_user" placeholder="user@example.com"></div>
      <div><label>密码</label><input id="smtp_password" type="password"></div>
    </div>
    <label>收件人</label><input id="smtp_to" placeholder="me@example.com">
  </div>
</div>

<div class="section">
  <h2>登录认证</h2>
  <div class="fields">
    <div class="row">
      <div><label>用户名</label><input id="auth_username"></div>
      <div><label>密码</label><input id="auth_password" type="password" placeholder="留空=无需认证"></div>
    </div>
  </div>
</div>

<div style="margin-top: 8px">
  <button class="btn btn-primary" onclick="saveAll()">保存所有设置</button>
</div>

<script>
async function load() {
  const r = await fetch('/api/settings'); const s = await r.json()
  for (const k of Object.keys(s)) {
    const el = document.getElementById(k); if (el) el.value = s[k] || ''
  }
}
async function saveAll() {
  const r = await fetch('/api/settings'); const s = await r.json()
  for (const k of Object.keys(s)) {
    const v = document.getElementById(k)?.value
    if (v !== undefined) await fetch('/api/settings/'+k+'?value='+encodeURIComponent(v||''), {method:'PUT'})
  }
  alert('已保存')
}
load()
</script>
{% endblock %}
