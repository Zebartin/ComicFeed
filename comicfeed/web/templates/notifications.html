{% extends "base.html" %}
{% block content %}
<style>
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; margin-bottom: 20px; box-shadow: var(--shadow-sm); }
.card h3 { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.card h3 .dot { width: 8px; height: 8px; border-radius: 50%; }
.dot-on { background: var(--accent); box-shadow: 0 0 6px rgba(61,120,103,.4); }
.dot-off { background: var(--text-muted); }
.field { margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
.field label { font-size: 12px; color: var(--text-muted); min-width: 80px; text-align: right; }
.field input { flex: 1; max-width: 380px; }
.card .hint { font-size: 11px; color: var(--text-muted); margin-top: 10px; line-height: 1.5; }
.row { display: flex; gap: 12px; }
.row .field { flex: 1; }
.row .field label { min-width: auto; text-align: left; }
</style>

<div class="page-header"><h1>通知配置</h1></div>

<div class="card">
  <h3><span class="dot" id="webhook-dot"></span> Webhook</h3>
  <div class="field"><label>URL</label><input id="webhook_url" placeholder="https://hooks.example.com/notify"><button class="btn btn-primary btn-sm" onclick="save('webhook_url')">保存</button></div>
  <div class="hint">支持 Discord/Slack/钉钉/飞书等。画廊创建/更新时 POST 事件数据。</div>
</div>

<div class="card">
  <h3><span class="dot" id="email-dot"></span> 邮件 (SMTP)</h3>
  <div class="row">
    <div class="field"><label>SMTP 主机</label><input id="smtp_host" placeholder="smtp.example.com"></div>
    <div class="field"><label>端口</label><input id="smtp_port" placeholder="587"></div>
  </div>
  <div class="row">
    <div class="field"><label>用户名</label><input id="smtp_user" placeholder="user@example.com"></div>
    <div class="field"><label>密码</label><input id="smtp_password" type="password" placeholder="密码"></div>
  </div>
  <div class="field"><label>收件人</label><input id="smtp_to" placeholder="me@example.com"><button class="btn btn-primary btn-sm" onclick="saveAllEmail()">保存全部</button></div>
  <div class="hint">填写完整 SMTP 信息后，画廊下载完成自动发送邮件通知。</div>
</div>

<script>
async function load() {
  const r = await fetch('/api/settings'); const s = await r.json()
  for (const k of Object.keys(s)) {
    const el = document.getElementById(k); if (el) el.value = s[k] || ''
  }
  updateDots(s)
}
function updateDots(s) {
  document.getElementById('webhook-dot').className = 'dot ' + (s.webhook_url ? 'dot-on' : 'dot-off')
  document.getElementById('email-dot').className = 'dot ' + (s.smtp_host && s.smtp_to ? 'dot-on' : 'dot-off')
}
async function save(key) {
  const v = document.getElementById(key).value
  await fetch('/api/settings/' + key + '?value=' + encodeURIComponent(v), {method:'PUT'})
  load()
}
async function saveAllEmail() {
  for (const k of ['smtp_host','smtp_port','smtp_user','smtp_password','smtp_to']) await save(k)
}
load()
</script>
{% endblock %}
