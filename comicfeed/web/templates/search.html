{% extends "base.html" %}
{% block content %}
<style>
.search-bar { display: flex; align-items: flex-end; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
.search-bar label { display: flex; flex-direction: column; gap: 4px; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; }
.search-bar select, .search-bar input { padding: 8px 12px; min-width: 120px; }

.results-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); display: none; flex-direction: column; max-height: 80vh; overflow: hidden; box-shadow: var(--shadow-md); }
.results-panel.on { display: flex; }
.results-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.results-header h3 { font-family: var(--font-serif); font-style: italic; font-size: 18px; font-weight: 400; color: var(--text); }
.results-body { flex: 1; overflow-y: auto; padding: 16px 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; align-content: start; }
.results-footer { display: flex; align-items: center; gap: 10px; padding: 12px 20px; border-top: 1px solid var(--border); flex-shrink: 0; }
.results-footer button:disabled { opacity: .4; cursor: not-allowed; }

.g-card { background: #fcfaf7; border: 2px solid var(--border); cursor: pointer; transition: all var(--transition); position: relative; user-select: none; }
.g-card:hover { border-color: var(--border-hover); box-shadow: 0 4px 16px rgba(0,0,0,.06); transform: translateY(-2px); }
.g-card.selected { border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-glow); background: #fefcf5; }
.g-card .cover { position: relative; width: 100%; background: #f0ebe0; line-height: 0; }
.g-card .cover img { display: block; width: 100%; height: auto; }
.g-card .cover .no-img { display: flex; align-items: center; justify-content: center; min-height: 200px; font-family: var(--font-serif); font-style: italic; font-size: 36px; color: var(--text-muted); opacity: .25; }
.g-card .sel { position: absolute; top: 12px; left: 12px; width: 32px; height: 32px; border-radius: 50%; border: 2px solid rgba(255,255,255,.8); background: rgba(0,0,0,.25); display: flex; align-items: center; justify-content: center; transition: all var(--transition); box-shadow: 0 2px 8px rgba(0,0,0,.15); }
.g-card.selected .sel { background: var(--gold); border-color: var(--gold); box-shadow: 0 4px 16px var(--gold-glow); transform: scale(1.1); }
.g-card .sel::after { content: ''; display: none; width: 8px; height: 14px; border: solid #fff; border-width: 0 3px 3px 0; transform: rotate(45deg) translateY(-1px); }
.g-card.selected .sel::after { display: block; }
.g-card .info { padding: 14px; }
.g-card .info .gid { font-family: var(--font-mono); font-size: 10px; color: var(--gold); margin-bottom: 6px; }
.g-card .info .title { font-size: 13px; font-weight: 500; line-height: 1.4; color: var(--text); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.g-card .info .meta { font-size: 11px; color: var(--text-muted); margin-top: 8px; display: flex; align-items: center; gap: 6px; }
.g-card .info .meta .dot { width: 3px; height: 3px; background: var(--text-muted); border-radius: 50%; }
.g-card .info .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
.g-card .info .tag { font-size: 10px; color: var(--cream-dim); background: #f0ebe0; padding: 2px 6px; border-radius: 3px; }
.empty-state { grid-column: 1 / -1; text-align: center; padding: 64px 28px; color: var(--text-muted); }
</style>

<div class="page-header"><h1>搜索</h1></div>

<div class="search-bar">
  <label>源 <select id="src-key"></select></label>
  <label>查询串 <input id="query" placeholder="如 chinese、artist:xxx" style="min-width:240px"></label>
  <label>排序 <select id="sort"></select></label>
  <label style="font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:4px"><input id="use-global" type="checkbox" checked> 全局条件</label>
  <button class="btn btn-primary" onclick="doSearch()">搜索</button>
</div>

<div class="results-panel" id="panel">
  <div class="results-header"><h3 id="res-title">搜索结果</h3><span style="font-size:12px;color:var(--text-muted)" id="res-count"></span></div>
  <div class="results-body" id="res-body"></div>
  <div class="results-footer">
    <span class="sel-count" id="sel-info">点选卡片选择</span>
    <button class="btn btn-ghost btn-sm" id="load-more-btn" onclick="loadMore()" style="display:none">加载更多</button>
    <button class="btn btn-ghost btn-sm" onclick="toggleAll()">全选</button>
    <button class="btn btn-gold btn-sm" onclick="downloadPicked()">下载选中</button>
    <button class="btn btn-ghost btn-sm" onclick="saveAsSub()">保存为订阅</button>
  </div>
</div>

<script>
const $=id=>document.getElementById(id)
let picked=new Set(),results=[],srcKey='',searchQuery='',sortBy='date'
let pageNum=1,hasMore=false,nextUrl='',pagesLoaded=0,max_pages=5
let excludeIds=[],existingTitles=[]

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function api(p,o={}){return fetch(p,o).then(r=>r.json())}

async function load() {
  const srcs=await api('/api/sources');window._srcs=srcs
  $('src-key').innerHTML=srcs.map(s=>`<option>${s.key}</option>`).join('')
  $('src-key').onchange=updateSort
  updateSort()
  $('query').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch()})
}
function updateSort() {
  const s=window._srcs?.find(x=>x.key===$('src-key').value)
  const opts=s?.sort_options||[]
  $('sort').innerHTML=opts.length?opts.map(o=>`<option value="${o.value}">${o.label}</option>`).join(''):'<option value="">(无)</option>'
}
async function doSearch() {
  srcKey=$('src-key').value;searchQuery=$('query').value;sortBy=$('sort').value
  if(!srcKey||!searchQuery)return
  picked.clear();results=[];pageNum=1;nextUrl='';pagesLoaded=0
  excludeIds=[];existingTitles=[]
  $('panel').classList.add('on');$('res-title').textContent='搜索中…';$('res-body').innerHTML='<div class="empty-state"><p>请稍候…</p></div>'
  await fetchPage()
}

async function fetchPage(loadMore=false) {
  if(!loadMore){pagesLoaded++;pageNum=1}
  else pagesLoaded++
  $('load-more-btn').textContent='加载中…';$('load-more-btn').disabled=true
  const r=await api('/api/search',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({source_key:srcKey,query:searchQuery,sort:sortBy,page:pageNum,next_url:nextUrl,exclude_ids:excludeIds,existing_titles:existingTitles,use_global_search:$('use-global').checked})})
  if(r.error){$('res-body').innerHTML='<div class="empty-state"><p style="color:var(--red)">'+r.error+'</p></div>';return}
  const items=r.items||[];hasMore=r.has_more;nextUrl=r.next_url||'';pageNum=r.current_page+1
  results=loadMore?results.concat(items):items
  items.forEach(g=>{excludeIds.push(g.native_id);existingTitles.push(g.title)})
  $('res-title').textContent='搜索结果';$('res-count').textContent=`共 ${results.length} 个`
  $('res-body').innerHTML=results.length?results.map((g,i)=>`<div class="g-card" id="gc-${i}">
    <div class="cover" onclick="pick(${i})">
      ${g.cover_url?`<img src="${g.cover_url}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:''}
      <div class="no-img" style="${g.cover_url?'display:none':'display:flex'}">&mdash;</div><div class="sel"></div>
    </div>
    <div class="info" onclick="event.stopPropagation();window.open('${g.web_url||''}','_blank')" style="cursor:pointer" title="在源站打开">
      <div class="gid">#${esc(g.native_id)}</div><div class="title">${esc(g.title)}</div>
      <div class="meta"><span>${g.page_count} 页</span>${g.num_favorites?`<span class="dot"></span><span>${g.num_favorites} 收藏</span>`:''}</div>
      ${g.tags&&g.tags.length?`<div class="tags">${g.tags.slice(0,6).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>`:''}
    </div>
  </div>`).join(''):'<div class="empty-state"><p>没有结果</p></div>'
  updateSel();updateLoadMore()
  if(hasMore && pagesLoaded < max_pages) setTimeout(()=>fetchPage(true), 150)
}
function pick(i){picked.has(i)?picked.delete(i):picked.add(i);$('gc-'+i).classList.toggle('selected',picked.has(i));updateSel()}
function toggleAll(){const all=picked.size===results.length;all?picked.clear():results.forEach((_,i)=>picked.add(i));results.forEach((_,i)=>$('gc-'+i)?.classList.toggle('selected',!all));updateSel()}
function updateSel(){$('sel-info').textContent=picked.size?`已选 ${picked.size} / ${results.length}`:'点选卡片选择'}
function updateLoadMore(){$('load-more-btn').style.display=hasMore?'':'none';$('load-more-btn').textContent='加载更多';$('load-more-btn').disabled=false}
async function loadMore(){max_pages+=5; fetchPage(true)}
async function downloadPicked(){
  if(!picked.size)return;const ids=[...picked].map(i=>results[i].native_id)
  const metas = {}
  ids.forEach(id => { const g = results.find(r => r.native_id === id); if (g) metas[id] = {title: g.title, cover_url: g.cover_url, web_url: g.web_url, page_count: g.page_count} })
  api('/api/galleries/batch-download',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({source_key:srcKey,gallery_ids:ids,gallery_metas:metas})}).catch(e=>console.error(e))
  $('sel-info').textContent=`已提交 ${ids.length} 个下载，即将跳转…`
  setTimeout(()=>{window.location.href='/queue'},800)
}
async function saveAsSub(){
  if(!srcKey||!searchQuery)return
  await api('/api/subscriptions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:searchQuery,source_key:srcKey,query:searchQuery,mode:'SEARCH',sort:sortBy})})
  $('sel-info').textContent='已保存为订阅';setTimeout(()=>{$('sel-info').textContent='点选卡片选择'},2000)
}
load()
</script>
{% endblock %}
