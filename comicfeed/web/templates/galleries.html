{% extends "base.html" %}
{% block content %}
<style>
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 18px; }
.g-card {
  background: #fcfaf7; border: 2px solid var(--border);
  cursor: pointer; transition: all var(--transition);
}
.g-card:hover { border-color: var(--border-hover); box-shadow: 0 4px 16px rgba(0,0,0,.06); transform: translateY(-2px); }
.g-card .cover { position: relative; width: 100%; background: #f0ebe0; line-height: 0; }
.g-card .cover img { display: block; width: 100%; height: auto; }
.g-card .cover .no-img { display: flex; align-items: center; justify-content: center; min-height: 200px; font-family: var(--font-serif); font-style: italic; font-size: 36px; color: var(--text-muted); opacity: .25; }
.g-card .info { padding: 14px; }
.g-card .info .gid { font-family: var(--font-mono); font-size: 10px; color: var(--gold); margin-bottom: 6px; letter-spacing: .02em; }
.g-card .info .title { font-size: 13px; font-weight: 500; line-height: 1.4; color: var(--text); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.g-card .info .meta { font-size: 11px; color: var(--text-muted); margin-top: 8px; display: flex; align-items: center; gap: 6px; }
.g-card .info .meta .dot { width: 3px; height: 3px; background: var(--text-muted); border-radius: 50%; }
.g-card .info .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
.g-card .info .tag { font-size: 10px; color: var(--cream-dim); background: #f0ebe0; padding: 2px 6px; border-radius: 3px; white-space: nowrap; }
.empty { text-align: center; padding: 64px 28px; color: var(--text-muted); grid-column: 1 / -1; }
</style>

<div class="page-header"><h1>画廊</h1></div>
<div class="grid" id="grid"></div>

<script>
function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML }
async function load() {
  const r = await fetch('/api/galleries?limit=100')
  const gals = await r.json()
  const g = document.getElementById('grid')
  if (!gals.length) g.innerHTML = '<div class="empty"><p style="font-size:14px;margin-bottom:4px">暂无已下载的画廊</p><p style="font-size:12px;opacity:.6">下载后在此浏览</p></div>'
  else g.innerHTML = gals.map(x => {
    const tags = x.tags && x.tags.length ? x.tags.slice(0, 6) : []
    return `<div class="g-card" onclick="window.open('${x.web_url||'https://nhentai.net/g/'+x.native_id+'/'}','_blank')">
      <div class="cover">
        ${x.cover_url ? `<img src="${x.cover_url}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
        <div class="no-img" style="${x.cover_url?'display:none':'display:flex'}">&mdash;</div>
      </div>
      <div class="info">
        <div class="gid">#${esc(x.native_id)}</div>
        <div class="title">${esc(x.display_title)}</div>
        <div class="meta"><span>${x.reported_pages} 页</span><span class="dot"></span><span>${x.num_favorites||0} 收藏</span></div>
        ${tags.length ? `<div class="tags">${tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}
      </div>
    </div>`
  }).join('')
}
load()
</script>
{% endblock %}
