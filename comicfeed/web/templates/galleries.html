{% extends "base.html" %}
{% block content %}
<h1 class="page-title">画廊</h1>
<div id="list"></div>
<script>
async function load() {
  const r = await fetch('/api/galleries?limit=100'); const gals = await r.json()
  document.getElementById('list').innerHTML = gals.length === 0
    ? '<p style="color:var(--cream-dim);padding:32px 0;text-align:center">暂无已下载的画廊</p>'
    : `<table><tr><th>ID</th><th>源</th><th>标题</th><th>页数</th></tr>
      ${gals.map(g => `<tr><td style="font-family:var(--font-mono);font-size:11px;color:var(--teal)">${g.native_id}</td><td>${g.source_key}</td><td>${g.display_title}</td><td>${g.reported_pages}</td></tr>`).join('')}</table>`
}
load()
</script>
{% endblock %}
