{% extends "base.html" %}
{% block content %}
<style>table{width:100%;border-collapse:collapse}th{text-align:left;padding:0.45rem 0.6rem;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-dim);border-bottom:1px solid var(--border)}td{padding:0.5rem 0.6rem;border-bottom:1px solid var(--border);font-size:0.84rem}</style>
<h2 style="font-size:1.3rem;color:#e8e0d5;margin-bottom:1rem">画廊</h2>
<div id="list"><p style="color:var(--text-dim)">加载中...</p></div>
<script>
async function load(){const r=await fetch('/api/galleries?limit=100');const gals=await r.json();document.getElementById('list').innerHTML=gals.length===0?'<p style="color:var(--text-dim)">暂无</p>':'<table><tr><th>ID</th><th>源</th><th>标题</th><th>页数</th></tr>'+gals.map(g=>`<tr><td style="color:var(--teal);font-family:monospace;font-size:0.78rem">${g.native_id}</td><td>${g.source_key}</td><td>${g.display_title}</td><td>${g.reported_pages}</td></tr>`).join('')+'</table>'}load()
</script>
{% endblock %}
