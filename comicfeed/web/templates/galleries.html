{% extends "base.html" %}
{% block content %}
<style>
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 18px; }
.g-card { background: #fcfaf7; border: 2px solid var(--border); cursor: pointer; transition: all var(--transition); position: relative; user-select: none; -webkit-tap-highlight-color: transparent; }
.g-card:hover { border-color: var(--border-hover); box-shadow: 0 4px 16px rgba(0,0,0,.06); transform: translateY(-2px); }
.g-card.selected { border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-glow), 0 4px 16px rgba(0,0,0,.06); background: #fefcf5; }
.g-card .cover { position: relative; width: 100%; background: #f0ebe0; line-height: 0; }
.g-card .cover img { display: block; width: 100%; height: auto; }
.g-card .cover .no-img { display: flex; align-items: center; justify-content: center; min-height: 200px; font-family: var(--font-serif); font-style: italic; font-size: 36px; color: var(--text-muted); opacity: .25; }
.g-card .sel {
  position: absolute; top: 10px; left: 10px; z-index: 5;
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,.8); background: rgba(0,0,0,.25);
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition); box-shadow: 0 2px 8px rgba(0,0,0,.15);
}
.g-card.selected .sel { background: var(--gold); border-color: var(--gold); box-shadow: 0 4px 16px var(--gold-glow); transform: scale(1.1); }
.g-card .sel::after { content: ''; display: none; width: 7px; height: 13px; border: solid #fff; border-width: 0 2px 2px 0; transform: rotate(45deg) translateY(-1px); }
.g-card.selected .sel::after { display: block; }
.g-card .info { padding: 14px; }
.g-card .info .gid { font-family: var(--font-mono); font-size: 10px; color: var(--gold); margin-bottom: 6px; letter-spacing: .02em; }
.g-card .info .title { font-size: 13px; font-weight: 500; line-height: 1.4; color: var(--text); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.g-card .info .meta { font-size: 11px; color: var(--text-muted); margin-top: 8px; display: flex; align-items: center; gap: 6px; }
.g-card .info .meta .dot { width: 3px; height: 3px; background: var(--text-muted); border-radius: 50%; }
.g-card .info .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
.g-card .info .tag { font-size: 10px; color: var(--cream-dim); background: #f0ebe0; padding: 2px 6px; border-radius: 3px; white-space: nowrap; }
</style>

<div class="page-header"><h1>画廊</h1></div>

<div class="toolbar" style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap">
  <select id="filter-src" onchange="load(0)" style="padding:6px 10px;font-size:12px;min-width:120px">
    <option value="">所有源</option>
  </select>
  <select id="sort-by" onchange="load(0)" style="padding:6px 10px;font-size:12px">
    <option value="date">下载时间</option>
    <option value="id">ID</option>
    <option value="pages">页数</option>
    <option value="favorites">收藏数</option>
    <option value="title">标题</option>
  </select>
  <button class="btn btn-ghost btn-sm" id="dir-btn" onclick="toggleDir()" title="切换升降序">&darr; 降序</button>
  <span style="font-size:12px;color:var(--text-muted);margin-right:auto" id="total-info"></span>
  <button class="btn btn-ghost btn-sm" onclick="toggleAll()" id="sel-btn" style="display:none">全选</button>
  <button class="btn btn-danger btn-sm" onclick="delSelected()" id="del-btn" style="display:none">删除选中</button>
</div>

<div class="grid" id="grid"></div>
<div class="pagination" id="pager"></div>

<script>
const PAGE_SIZE = 24
let currentPage = 0, total = 0, sortDir = 'desc', picked = new Set(), allGals = []
function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML }

async function loadSrcs() {
  const r = await fetch('/api/sources'); const srcs = await r.json()
  document.getElementById('filter-src').innerHTML = '<option value="">所有源</option>' + srcs.map(s => `<option>${s.key}</option>`).join('')
}

async function load(page) {
  currentPage = page; picked.clear()
  const src = document.getElementById('filter-src').value
  const sort = document.getElementById('sort-by').value
  const params = new URLSearchParams({limit: PAGE_SIZE, offset: page * PAGE_SIZE, sort, sort_dir: sortDir})
  if (src) params.set('source_key', src)

  const r = await fetch('/api/galleries?' + params); const data = await r.json()
  total = data.total; allGals = data.items

  document.getElementById('total-info').textContent = `共 ${total} 个画廊`
  const g = document.getElementById('grid')
  if (!allGals.length) {
    g.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:64px 20px;color:var(--text-muted)"><p>暂无已下载的画廊</p></div>'
  } else {
    g.innerHTML = allGals.map((x,i) => {
      const tags = x.tags && x.tags.length ? x.tags.slice(0, 6) : []
      return `<div class="g-card" id="gc-${i}">
        <div class="cover" onclick="pick(${i},event)">
          ${x.cover_url ? `<img src="${x.cover_url}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
          <div class="no-img" style="${x.cover_url?'display:none':'display:flex'}">&mdash;</div>
          <div class="sel"></div>
        </div>
        <div class="info" onclick="event.stopPropagation();window.open('${x.web_url||''}','_blank')" style="cursor:pointer" title="在源站打开">
          <div class="gid">#${esc(x.native_id)}</div>
          <div class="title">${esc(x.display_title)}</div>
          <div class="meta"><span>${x.actual_pages||x.reported_pages} 页</span><span class="dot"></span><span>${x.num_favorites||0} 收藏</span></div>
          ${tags.length ? `<div class="tags">${tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}
        </div>
      </div>`
    }).join('')
  }
  updateToolbar(); renderPager()
}

function pick(idx, ev) {
  ev.stopPropagation()
  const g = allGals[idx]
  picked.has(g.id) ? picked.delete(g.id) : picked.add(g.id)
  document.getElementById('gc-'+idx)?.classList.toggle('selected', picked.has(g.id))
  updateToolbar()
}

function toggleAll() {
  const all = picked.size === allGals.length
  all ? picked.clear() : allGals.forEach(g => picked.add(g.id))
  allGals.forEach((g,i) => document.getElementById('gc-'+i)?.classList.toggle('selected', !all))
  updateToolbar()
}

function updateToolbar() {
  document.getElementById('sel-btn').style.display = allGals.length ? '' : 'none'
  document.getElementById('del-btn').style.display = picked.size ? '' : 'none'
  document.getElementById('sel-btn').textContent = picked.size === allGals.length ? '取消全选' : '全选'
}

async function delSelected() {
  if (!picked.size) return
  if (!confirm(`删除 ${picked.size} 条记录？文件不受影响。`)) return
  for (const id of picked) {
    try { await fetch('/api/galleries/'+id, {method:'DELETE'}) } catch(e) {}
  }
  picked.clear(); load(currentPage)
}

function toggleDir() {
  sortDir = sortDir === 'desc' ? 'asc' : 'desc'
  document.getElementById('dir-btn').innerHTML = sortDir === 'desc' ? '&darr; 降序' : '&uarr; 升序'
  load(0)
}

function renderPager() {
  const pages = Math.ceil(total / PAGE_SIZE)
  const p = document.getElementById('pager')
  if (pages <= 1) { p.innerHTML = ''; return }
  let html = `<button class="btn btn-ghost btn-sm" onclick="load(${currentPage-1})" ${currentPage===0?'disabled':''}>上一页</button>`
  for (let i = 0; i < Math.min(pages, 10); i++)
    html += `<button class="btn btn-sm ${i===currentPage?'btn-primary':'btn-ghost'}" onclick="load(${i})">${i+1}</button>`
  html += `<button class="btn btn-ghost btn-sm" onclick="load(${currentPage+1})" ${currentPage>=pages-1?'disabled':''}>下一页</button>`
  p.innerHTML = html
}

loadSrcs(); load(0)
</script>
{% endblock %}
