{% extends "base.html" %}
{% block content %}
<div class="page-header"><h1>画廊</h1></div>
<div id="list"></div>
<script>
async function load(){const r=await fetch('/api/galleries?limit=100');const g=await r.json()
document.getElementById('list').innerHTML=g.length===0
?'<p style="color:var(--text-muted);padding:40px 0;text-align:center">暂无已下载的画廊</p>'
:`<table><thead><tr><th>ID</th><th>源</th><th>标题</th><th>页数</th></tr></thead><tbody>${g.map(x=>`<tr><td style="font-family:var(--font-mono);font-size:11px;color:var(--gold)">${x.native_id}</td><td>${x.source_key}</td><td>${x.display_title}</td><td>${x.reported_pages}</td></tr>`).join('')}</tbody></table>`}
load()
</script>
{% endblock %}
