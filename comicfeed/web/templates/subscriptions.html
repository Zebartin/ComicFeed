{% extends "base.html" %}
{% block content %}
<style>
/* ── Page Layout ── */
.toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
.toolbar .stat { font-size: 12px; color: var(--text-muted); letter-spacing: .04em; }

/* Status badges */
.badge { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 99px; letter-spacing: .02em; }
.badge-on  { background: var(--accent-light); color: var(--accent); }
.badge-off { background: #f5f3f0; color: var(--text-muted); }

/* ── Form Panel ── */
.form-panel {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 28px; margin-bottom: 24px; display: none;
  box-shadow: var(--shadow-md);
  animation: slide-up .3s cubic-bezier(.22,1,.36,1);
}
.form-panel.on { display: block; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 28px; }
.form-grid label {
  display: flex; flex-direction: column; gap: 5px;
  font-size: 11px; font-weight: 600; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: .06em;
}
.form-grid label.full { grid-column: 1 / -1; }
.form-grid label.inline { flex-direction: row; align-items: center; gap: 10px; }
.form-actions { margin-top: 22px; display: flex; gap: 10px; }

/* ── Results Modal ── */
.results-dialog {
  background: var(--surface); border-radius: var(--radius-lg);
  width: min(1080px, 96vw); max-height: 88vh; display: flex; flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,.12), 0 2px 8px rgba(0,0,0,.06);
  animation: slide-up .35s cubic-bezier(.22,1,.36,1);
  overflow: hidden;
}
.results-dialog header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 22px 28px; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.results-dialog header h2 {
  font-family: var(--font-serif); font-weight: 500; font-style: italic;
  font-size: 22px; color: var(--text); letter-spacing: .01em;
}
.results-dialog header .sub {
  font-size: 12px; color: var(--text-muted); margin-top: 3px;
}

.results-body {
  flex: 1; overflow-y: auto; padding: 24px 28px;
  display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 18px; align-content: start;
}

/* ── Gallery Card ── */
.g-card {
  background: #fcfaf7; border: 2px solid var(--border);
  cursor: pointer; transition: all var(--transition);
  position: relative; user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.g-card:hover {
  border-color: var(--border-hover);
  box-shadow: 0 4px 16px rgba(0,0,0,.06);
  transform: translateY(-2px);
}
.g-card.selected {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px var(--gold-glow), 0 4px 16px rgba(0,0,0,.06);
  background: #fefcf5;
}

.g-card .cover {
  position: relative; width: 100%; background: #f0ebe0; line-height: 0;
}
.g-card .cover img { display: block; width: 100%; height: auto; }
.g-card .cover .no-img {
  display: flex; align-items: center; justify-content: center; min-height: 200px;
  font-family: var(--font-serif); font-style: italic;
  font-size: 36px; color: var(--text-muted); opacity: .25;
}
.g-card .cover .no-img {
  font-family: var(--font-serif); font-style: italic;
  font-size: 36px; color: var(--text-muted); opacity: .25;
}

/* Selection indicator on cover */
.g-card .sel {
  position: absolute; top: 12px; left: 12px; z-index: 5;
  width: 32px; height: 32px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,.8);
  background: rgba(0,0,0,.25); backdrop-filter: blur(2px);
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
}
.g-card.selected .sel {
  background: var(--gold); border-color: var(--gold);
  box-shadow: 0 4px 16px var(--gold-glow);
  transform: scale(1.1);
}
.g-card .sel::after {
  content: ''; display: none;
  width: 8px; height: 14px;
  border: solid #fff; border-width: 0 3px 3px 0;
  transform: rotate(45deg) translateY(-1px);
}
.g-card.selected .sel::after { display: block; }

.g-card .info { padding: 14px; }
.g-card .info .gid {
  font-family: var(--font-mono); font-size: 10px; color: var(--gold);
  margin-bottom: 6px; letter-spacing: .02em;
}
.g-card .info .title {
  font-size: 13px; font-weight: 500; line-height: 1.4; color: var(--text);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.g-card .info .meta {
  font-size: 11px; color: var(--text-muted); margin-top: 8px;
  display: flex; align-items: center; gap: 6px;
}
.tags { display:flex;flex-wrap:wrap;gap:4px;margin-top:8px }
.tag { font-size:10px;color:var(--cream-dim);background:#f0ebe0;padding:2px 6px;border-radius:3px;white-space:nowrap }
.g-card .info .meta .dot {
  width: 3px; height: 3px; background: var(--text-muted); border-radius: 50%;
}

/* Footer */
.results-dialog footer {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 28px; border-top: 1px solid var(--border);
  flex-shrink: 0; background: #faf8f5;
}
.results-dialog footer .sel-count {
  font-size: 13px; color: var(--text-secondary); margin-right: auto;
}
.results-dialog footer .sel-count strong { color: var(--gold); }

/* Empty state */
.empty-state {
  grid-column: 1 / -1; text-align: center; padding: 64px 28px;
}
.empty-state .icon {
  font-family: var(--font-serif); font-style: italic; font-size: 48px;
  color: var(--text-muted); opacity: .25; margin-bottom: 16px;
}
.empty-state h3 { font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
.empty-state p { font-size: 13px; color: var(--text-muted); }
</style>

<div class="page-header">
  <h1>订阅</h1>
  <span class="stat" id="sub-stat"></span>
  <button class="btn btn-primary" onclick="openForm()" style="margin-left:auto">新建订阅</button>
</div>

<div id="sub-list"></div>

<!-- Create / Edit form -->
<div class="form-panel" id="form">
  <div class="form-grid">
    <label>名称 <input id="name"></label>
    <label>源 <select id="source_key"></select></label>
    <label class="full">查询串 <input id="query"></label>
    <label>模式 <select id="mode"><option value="SEARCH">搜索条件</option><option value="SPECIFIC_GALLERY">特定画廊</option></select></label>
    <label>排序 <select id="sort"><option value="date">最新</option><option value="popular-today">今日热门</option><option value="popular-week">本周热门</option><option value="popular">全部热门</option></select></label>
    <label>间隔 (分钟) <input id="interval" type="number" value="360"></label>
    <label>CBZ 分卷 <input id="cbz_max_pages" type="number" value="0"><span style="font-size:10px;color:var(--text-muted);margin-top:3px">0 = 不分卷</span></label>
    <label class="inline"><input id="enabled" type="checkbox" checked> 启用</label>
  </div>
  <input type="hidden" id="sub-id">
  <div class="form-actions">
    <button class="btn btn-primary" onclick="saveSub()">保存订阅</button>
    <button class="btn btn-ghost" onclick="closeForm()">取消</button>
  </div>
</div>

<!-- Results Modal -->
<div class="modal-overlay" id="overlay">
  <div class="results-dialog">
    <header>
      <div>
        <h2 id="res-title">检查结果</h2>
        <div class="sub" id="res-meta"></div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="closeResults()">关闭</button>
    </header>
    <div class="results-body" id="res-body"></div>
    <footer>
      <span class="sel-count" id="sel-info">点选画廊卡片即可选择</span>
      <button class="btn btn-ghost btn-sm" onclick="toggleAll()">全选 / 取消</button>
      <button class="btn btn-gold btn-sm" onclick="downloadPicked()">下载选中</button>
    </footer>
  </div>
</div>

<script>
let picked = new Set(), results = [], current = null;
const $ = id => document.getElementById(id)

async function api(p, o={}) {
  const r = await fetch(p, o)
  if (!r.ok && r.status !== 204) throw new Error(r.status)
  return r.status === 204 ? null : r.json()
}

async function load() {
  try {
    const [subs, srcs] = await Promise.all([api('/api/subscriptions'), api('/api/sources')])
    $('source_key').innerHTML = srcs.map(s => `<option>${s.key}</option>`).join('')
    $('sub-stat').textContent = `${subs.length} 个订阅`
    if (!subs.length) {
      $('sub-list').innerHTML = '<p style="color:var(--text-muted);padding:40px 0;text-align:center">暂无订阅 — 点击右上角"新建订阅"开始</p>'
    } else {
      $('sub-list').innerHTML = `<table>
        <thead><tr><th>名称</th><th>源</th><th>查询</th><th>间隔</th><th>状态</th><th style="width:200px">操作</th></tr></thead>
        <tbody>${subs.map(s => `<tr>
          <td style="font-weight:500">${esc(s.name)}</td>
          <td style="font-family:var(--font-mono);font-size:12px;color:var(--text-muted)">${esc(s.source_key)}</td>
          <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(s.query)}</td>
          <td>${s.interval_minutes} 分</td>
          <td>${s.enabled ? '<span class="badge badge-on">启用</span>' : '<span class="badge badge-off">停用</span>'}</td>
          <td>
            <button class="btn btn-ghost btn-xs" onclick="editSub(${s.id})">编辑</button>
            <button class="btn btn-primary btn-xs" onclick="checkSub(${s.id})">检查</button>
            <button class="btn btn-danger btn-xs" onclick="delSub(${s.id})">删除</button>
          </td>
        </tr>`).join('')}</tbody></table>`
    }
  } catch(e) { $('sub-list').innerHTML = `<p style="color:var(--red)">加载失败: ${e.message}</p>` }
}
function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML }

/* Form */
function openForm() { $('sub-id').value=''; $('form').reset(); $('form').classList.add('on') }
function closeForm() { $('form').classList.remove('on') }
async function editSub(id) {
  const s = await api('/api/subscriptions/'+id); $('sub-id').value = id
  for (const k of ['name','source_key','query','mode','interval','cbz_max_pages','sort']) $(k).value = s[k] ?? ''
  $('enabled').checked = s.enabled; $('form').classList.add('on')
}
async function saveSub() {
  const id = $('sub-id').value, body = {
    name: $('name').value, source_key: $('source_key').value, query: $('query').value,
    mode: $('mode').value, interval_minutes: +$('interval').value,
    cbz_max_pages: +$('cbz_max_pages').value, sort: $('sort').value, enabled: $('enabled').checked,
  }
  if (id) await api('/api/subscriptions/'+id, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
  else await api('/api/subscriptions', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
  closeForm(); load()
}
async function delSub(id) { if (confirm('确认删除？')) { await api('/api/subscriptions/'+id, {method:'DELETE'}); load() } }

/* Results */
async function checkSub(id) {
  const sub = await api('/api/subscriptions/'+id)
  const r = await api('/api/subscriptions/'+id+'/check', {method:'POST'})
  if (r.error) { alert(r.error); return }
  results = r.new_galleries || []; current = r.subscription; picked.clear()

  $('res-title').textContent = '检查结果'
  $('res-meta').textContent = `${r.subscription.name} · ${r.subscription.source_key} · 查询: ${r.subscription.query || '(空)'}`

  if (!results.length) {
    $('res-body').innerHTML = '<div class="empty-state"><div class="icon">&para;</div><h3>没有新发现</h3><p>所有匹配的画廊都已下载</p></div>'
  } else {
    $('res-body').innerHTML = results.map((g,i) => `\n        <div class="g-card" id="gc-${i}">
        <div class="cover" onclick="toggleCard('${g.native_id}',${i})">
          ${g.cover_url ? `<img src="${g.cover_url}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
          <div class="no-img" style="${g.cover_url?'display:none':'display:flex'}">&mdash;</div>
          <div class="sel"></div>
        </div>
        <div class="info" onclick="openNhentai(event,this.dataset.nid)" data-nid="${g.native_id}" style="cursor:pointer" title="在 nhentai 打开">
          <div class="gid">#${esc(g.native_id)}</div>
          <div class="title">${esc(g.title)}</div>
          <div class="meta"><span>${g.page_count} 页</span><span class="dot"></span><span>${g.favorites||0} 收藏</span></div>
          ${g.tags&&g.tags.length?`<div class="tags">${g.tags.slice(0,6).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>`:''}
        </div>
      </div>`).join('')
  }
  $('overlay').classList.add('on'); updateSel()
}

function openNhentai(ev, nid) {
  ev.stopPropagation()
  window.open('https://nhentai.net/g/' + nid + '/', '_blank')
}

function toggleCard(id, idx) {
  picked.has(id) ? picked.delete(id) : picked.add(id)
  document.getElementById('gc-'+idx)?.classList.toggle('selected', picked.has(id))
  updateSel()
}
function toggleAll() {
  const all = results.length === picked.size
  all ? picked.clear() : results.forEach(g => picked.add(g.native_id))
  results.forEach((g,i) => document.getElementById('gc-'+i)?.classList.toggle('selected', !all))
  updateSel()
}
function updateSel() {
  $('sel-info').innerHTML = picked.size ? `已选 <strong>${picked.size}</strong> / ${results.length}` : '点选画廊卡片即可选择'
}

async function downloadPicked() {
  if (!picked.size) return
  const ids = [...picked]; $('sel-info').textContent = `下载中 0/${ids.length} ...`
  for (let i=0;i<ids.length;i++) {
    try { await api('/api/galleries/download', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({source_key:current.source_key,gallery_id:ids[i]})}) } catch(e) { console.error(e) }
    $('sel-info').textContent = `下载中 ${i+1}/${ids.length} ...`
  }
  $('sel-info').textContent = `已提交 ${ids.length} 个下载任务`
  setTimeout(() => { closeResults(); load() }, 1500)
}
function closeResults() { $('overlay').classList.remove('on') }

load()
</script>
{% endblock %}
