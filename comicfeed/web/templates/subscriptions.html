{% extends "base.html" %}
{% block content %}
<style>
/* ── Page Layout ── */
.toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
.toolbar .stat { font-size: 12px; color: var(--text-muted); letter-spacing: .04em; }

/* Status badges */
.badge { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 99px; letter-spacing: .02em; }
.badge-on  { background: var(--accent-light); color: var(--accent); }
.badge-off { background: #f5f3f0; color: var(--text-muted); }

/* ── Form Panel ── */
.form-panel {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 28px; margin-bottom: 24px; display: none;
  box-shadow: var(--shadow-md);
  animation: slide-up .3s cubic-bezier(.22,1,.36,1);
}
.form-panel.on { display: block; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 28px; }
.form-grid label {
  display: flex; flex-direction: column; gap: 5px;
  font-size: 11px; font-weight: 600; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: .06em;
}
.form-grid label.full { grid-column: 1 / -1; }
.form-grid label.inline { flex-direction: row; align-items: center; gap: 10px; }
.form-actions { margin-top: 22px; display: flex; gap: 10px; }

/* ── Results Modal ── */
.results-dialog {
  background: var(--surface); border-radius: var(--radius-lg);
  width: min(1080px, 96vw); max-height: 88vh; display: flex; flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,.12), 0 2px 8px rgba(0,0,0,.06);
  animation: slide-up .35s cubic-bezier(.22,1,.36,1);
  overflow: hidden;
}
.results-dialog header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 22px 28px; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.results-dialog header h2 {
  font-family: var(--font-serif); font-weight: 500; font-style: italic;
  font-size: 22px; color: var(--text); letter-spacing: .01em;
}
.results-dialog header .sub {
  font-size: 12px; color: var(--text-muted); margin-top: 3px;
}

.results-body {
  flex: 1; overflow-y: auto; padding: 24px 28px;
  display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 18px; align-content: start;
}

/* ── Gallery Card ── */
.g-card {
  background: #fcfaf7; border: 2px solid var(--border);
  cursor: pointer; transition: all var(--transition);
  position: relative; user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.g-card:hover {
  border-color: var(--border-hover);
  box-shadow: 0 4px 16px rgba(0,0,0,.06);
  transform: translateY(-2px);
}
.g-card.selected {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px var(--gold-glow), 0 4px 16px rgba(0,0,0,.06);
  background: #fefcf5;
}

.g-card .cover {
  position: relative; width: 100%; background: #f0ebe0; line-height: 0;
}
.g-card .cover img { display: block; width: 100%; height: auto; }
.g-card .cover .no-img {
  display: flex; align-items: center; justify-content: center; min-height: 200px;
  font-family: var(--font-serif); font-style: italic;
  font-size: 36px; color: var(--text-muted); opacity: .25;
}
.g-card .cover .no-img {
  font-family: var(--font-serif); font-style: italic;
  font-size: 36px; color: var(--text-muted); opacity: .25;
}

/* Selection indicator on cover */
.g-card .sel {
  position: absolute; top: 12px; left: 12px; z-index: 5;
  width: 32px; height: 32px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,.8);
  background: rgba(0,0,0,.25); backdrop-filter: blur(2px);
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
}
.g-card.selected .sel {
  background: var(--gold); border-color: var(--gold);
  box-shadow: 0 4px 16px var(--gold-glow);
  transform: scale(1.1);
}
.g-card .sel::after {
  content: ''; display: none;
  width: 8px; height: 14px;
  border: solid #fff; border-width: 0 3px 3px 0;
  transform: rotate(45deg) translateY(-1px);
}
.g-card.selected .sel::after { display: block; }

.g-card .info { padding: 14px; }
.g-card .info .gid {
  font-family: var(--font-mono); font-size: 10px; color: var(--gold);
  margin-bottom: 6px; letter-spacing: .02em;
}
.g-card .info .title {
  font-size: 13px; font-weight: 500; line-height: 1.4; color: var(--text);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.g-card .info .meta {
  font-size: 11px; color: var(--text-muted); margin-top: 8px;
  display: flex; align-items: center; gap: 6px;
}
.tags { display:flex;flex-wrap:wrap;gap:4px;margin-top:8px }
.tag { font-size:10px;color:var(--cream-dim);background:#f0ebe0;padding:2px 6px;border-radius:3px;white-space:nowrap }
.g-card .info .meta .dot {
  width: 3px; height: 3px; background: var(--text-muted); border-radius: 50%;
}

/* Footer */
.results-dialog footer {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 28px; border-top: 1px solid var(--border);
  flex-shrink: 0; background: #faf8f5;
}
.results-dialog footer .sel-count {
  font-size: 13px; color: var(--text-secondary); margin-right: auto;
}
.results-dialog footer .sel-count strong { color: var(--gold); }
.results-dialog footer button:disabled { opacity: .4; cursor: not-allowed; }

/* Empty state */
.empty-state {
  grid-column: 1 / -1; text-align: center; padding: 64px 28px;
}
.empty-state .icon {
  font-family: var(--font-serif); font-style: italic; font-size: 48px;
  color: var(--text-muted); opacity: .25; margin-bottom: 16px;
}
.empty-state h3 { font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
.empty-state p { font-size: 13px; color: var(--text-muted); }
</style>

<div id="setup-banner" style="display:none;background:var(--gold-light);border:1px solid var(--gold);border-radius:var(--radius);padding:12px 18px;margin-bottom:20px;font-size:13px;color:var(--text)">
  &#9888; 配置未完成，请先前往 <a href="/setup" style="color:var(--gold);font-weight:600">设置向导</a> 完成基础配置。
</div>

<div class="page-header">
  <h1>订阅</h1>
  <span class="stat" id="sub-stat"></span>
  <button class="btn btn-primary" onclick="openForm()" style="margin-left:auto">新建订阅</button>
</div>

<div class="toolbar" style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
  <input id="sub-search" placeholder="搜索名称..." oninput="onFilterChange()" style="flex:1;min-width:160px;max-width:280px;padding:6px 10px;font-size:12px">
  <select id="sub-filter-src" onchange="onFilterChange()" style="padding:6px 10px;font-size:12px"><option value="">所有源</option></select>
  <select id="sub-filter-enabled" onchange="onFilterChange()" style="padding:6px 10px;font-size:12px"><option value="">全部</option><option value="1">启用</option><option value="0">停用</option></select>
</div>

<!-- Create / Edit form -->
<div class="form-panel" id="form">
  <div class="form-grid">
    <label>名称 <input id="name"></label>
    <label>源 <select id="source_key"></select></label>
    <label class="full"><span id="query-label">查询串</span> <input id="query"></label>
    <label>模式 <select id="mode" onchange="onModeChange()"><option value="SEARCH">搜索条件</option><option value="SPECIFIC_GALLERY">特定画廊</option></select></label>
    <label class="search-only">排序 <select id="sort"></select></label>
    <label>间隔 (分钟) <input id="interval" type="number" value="1440"></label>
    <label class="search-only">搜索页数 <input id="search_pages" type="number" value="1"><span style="font-size:10px;color:var(--text-muted);margin-top:3px">自动检查翻页数</span></label>
    <label>CBZ 分卷 <input id="cbz_max_pages" type="number" value="0"><span style="font-size:10px;color:var(--text-muted);margin-top:3px">0 = 不分卷</span></label>
    <label>下载目录 <input id="download_dir" placeholder="留空使用全局设置"></label>
  </div>
  <div style="margin-top:12px" class="search-only" id="filter-section">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em">筛选条件</span>
      <button class="btn btn-ghost btn-xs" onclick="addFilterRow()">+ 添加</button>
    </div>
    <div id="filter-rows"></div>
    <label style="display:flex;align-items:center;gap:8px;margin-top:10px;font-size:12px;color:var(--text-secondary)">
      <input id="use_global_search" type="checkbox" checked> 应用全局搜索条件（设置页可编辑）</label>
  </div>
  <div class="form-grid" style="margin-top:12px">
    <label class="inline"><input id="enabled" type="checkbox" checked> 启用</label>
  </div>
  <input type="hidden" id="sub-id">
  <div class="form-actions">
    <button class="btn btn-primary" onclick="saveSub()">保存订阅</button>
    <button class="btn btn-ghost" onclick="closeForm()">取消</button>
  </div>
</div>

<div id="sub-list"></div>

<!-- Results Modal -->
<div class="modal-overlay" id="overlay">
  <div class="results-dialog">
    <header>
      <div>
        <h2 id="res-title">检查结果</h2>
        <div class="sub" id="res-meta"></div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="closeResults()">关闭</button>
    </header>
    <div class="results-body" id="res-body"></div>
    <footer>
      <span class="sel-count" id="sel-info">点选画廊卡片即可选择</span>
      <button class="btn btn-ghost btn-sm" id="load-more-btn" onclick="loadMore()" style="display:none">加载更多</button>
      <button class="btn btn-ghost btn-sm" onclick="toggleAll()">全选 / 取消</button>
      <button class="btn btn-gold btn-sm" onclick="downloadPicked()">下载选中</button>
    </footer>
  </div>
</div>

<script>
let picked = new Set(), results = [], current = null;
let checkPage = 0, checkHasMore = false, checkExcludeIds = [], checkTitles = [], checkNextUrl = '';
let checkPagesLoaded = 0, checkMaxPages = 5, _chainTimer = 0, _checkGen = 0;
const $ = id => document.getElementById(id)

async function api(p, o={}) {
  const r = await fetch(p, o)
  if (!r.ok && r.status !== 204) throw new Error(r.status)
  return r.status === 204 ? null : r.json()
}

let _subs = []
let _sortCol = null, _sortDir = null, _page = 0
const PAGE_SIZE = 20

async function load() {
  try {
    const st = await api('/api/setup/status')
    document.getElementById('setup-banner').style.display = st.all_done ? 'none' : ''
  } catch(_) {}

  try {
    const [subs, srcs] = await Promise.all([api('/api/subscriptions'), api('/api/sources')])
    window._srcs = srcs
    _subs = subs
    $('source_key').innerHTML = srcs.map(s => `<option>${s.key}</option>`).join('')
    $('source_key').onchange = updateSortForm
    updateSortForm()
    $('sub-filter-src').innerHTML = '<option value="">所有源</option>' + srcs.map(s => `<option>${s.key}</option>`).join('')
    render()
  } catch(e) { $('sub-list').innerHTML = `<p style="color:var(--red)">加载失败: ${e.message}</p>` }
}

function render() {
  const q = ($('sub-search').value || '').toLowerCase()
  const src = $('sub-filter-src').value
  const en = $('sub-filter-enabled').value
  let filtered = _subs
  if (q) filtered = filtered.filter(s => (s.name||'').toLowerCase().includes(q))
  if (src) filtered = filtered.filter(s => s.source_key === src)
  if (en) filtered = filtered.filter(s => s.enabled === (en === '1'))
  $('sub-stat').textContent = filtered.length !== _subs.length ? `${filtered.length} / ${_subs.length} 个订阅` : `${_subs.length} 个订阅`
  if (!filtered.length) {
    $('sub-list').innerHTML = '<p style="color:var(--text-muted);padding:40px 0;text-align:center">暂无订阅</p>'
    return
  }

  // Sort
  if (_sortCol === 'name') {
    filtered.sort((a, b) => (a.name || '').toLowerCase().localeCompare((b.name || '').toLowerCase()))
    if (_sortDir === 'desc') filtered.reverse()
  } else if (_sortCol === 'nextCheck') {
    filtered.sort((a, b) => nextCheckTs(a) - nextCheckTs(b))
    if (_sortDir === 'desc') filtered.reverse()
  } else {
    filtered.sort((a, b) => (b.created_at || '').localeCompare(a.created_at || ''))
  }

  // Paginate
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE)
  if (_page >= totalPages) _page = Math.max(0, totalPages - 1)
  const pageItems = filtered.slice(_page * PAGE_SIZE, (_page + 1) * PAGE_SIZE)

  const sortArrow = col => _sortCol === col ? (_sortDir === 'asc' ? ' ▲' : ' ▼') : ''
  const sortStyle = 'cursor:pointer;user-select:none'

  $('sub-list').innerHTML = `<table>
    <thead><tr>
      <th onclick="toggleSort(\'name\')" style="${sortStyle}">名称<span>${sortArrow('name')}</span></th>
      <th>源</th>
      <th onclick="toggleSort(\'nextCheck\')" style="${sortStyle}">下次检查<span>${sortArrow('nextCheck')}</span></th>
      <th>间隔</th>
      <th>状态</th>
      <th style="width:200px">操作</th>
    </tr></thead>
    <tbody>${pageItems.map(s => `<tr>
      <td style="font-weight:500">${esc(s.name)}<div style="font-size:10px;color:#bbb;margin-top:1px">${s.created_at||''}</div></td>
      <td style="font-family:var(--font-mono);font-size:12px;color:var(--text-muted)">${esc(s.source_key)}</td>
      <td style="font-size:12px">${nextCheckAt(s)}</td>
      <td>${fmtInterval(s.interval_minutes)}</td>
      <td>${s.enabled ? '<span class="badge badge-on">启用</span>' : '<span class="badge badge-off">停用</span>'}</td>
      <td>
        <button class="btn btn-ghost btn-xs" onclick="editSub(${s.id})">编辑</button>
        <button class="btn btn-primary btn-xs" onclick="checkSub(${s.id})">检查</button>
        <button class="btn btn-danger btn-xs" onclick="delSub(${s.id})">删除</button>
      </td>
    </tr>`).join('')}</tbody></table>
    ${totalPages > 1 ? `<div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-top:16px;flex-wrap:wrap">
      <button class="btn btn-ghost btn-xs" onclick="goPage(${_page - 1})" ${_page === 0 ? 'disabled' : ''}>&larr;</button>
      ${Array.from({length: totalPages}, (_, i) =>
        i === _page ? `<span style="padding:4px 8px;font-weight:600;font-size:12px">${i + 1}</span>` : `<button class="btn btn-ghost btn-xs" onclick="goPage(${i})">${i + 1}</button>`
      ).join('')}
      <button class="btn btn-ghost btn-xs" onclick="goPage(${_page + 1})" ${_page >= totalPages - 1 ? 'disabled' : ''}>&rarr;</button>
      <span style="font-size:11px;color:var(--text-muted);margin-left:8px">${_page + 1} / ${totalPages} 页</span>
    </div>` : ''}`
}
function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML }
function fmtInterval(m) { if (m>=1440 && m%1440===0) return (m/1440)+' 天'; if (m>=60 && m%60===0) return (m/60)+' 小时'; return m+' 分钟' }
function nextCheckAt(s) { if (!s.last_checked_at) return '<span style="color:var(--green)">立即</span>'; const dt=new Date(s.last_checked_at); dt.setMinutes(dt.getMinutes()+s.interval_minutes); return dt.toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) }
function nextCheckTs(s) { if (!s.last_checked_at) return 0; const dt=new Date(s.last_checked_at); dt.setMinutes(dt.getMinutes()+s.interval_minutes); return dt.getTime() }
function onFilterChange() { _page = 0; render() }
function toggleSort(col) {
  if (_sortCol === col) {
    if (_sortDir === 'asc') _sortDir = 'desc'
    else if (_sortDir === 'desc') { _sortCol = null; _sortDir = null }
  } else { _sortCol = col; _sortDir = 'asc' }
  _page = 0; render()
}
function goPage(p) { _page = p; render() }

/* Filter rows */
const _flds = {num_favorites:'收藏数', page_count:'页数', upload_date:'上传日期'}
const _ops = {num_favorites:[['gte','≥'],['lte','≤']], page_count:[['gte','≥'],['lte','≤']], upload_date:[['since_days','最近']]}
function addFilterRow(fld, op, val) {
  const r = document.createElement('div'); r.style.cssText = 'display:flex;gap:6px;align-items:center;margin-bottom:4px'
  const sf = document.createElement('select'); sf.style.cssText='padding:4px 6px;font-size:11px'
  Object.entries(_flds).forEach(([k,v])=>{ sf.innerHTML += `<option value="${k}" ${k===fld?'selected':''}>${v}</option>` })
  const so = document.createElement('select'); so.style.cssText='padding:4px 6px;font-size:11px'
  const updateOps = () => { const f=sf.value; so.innerHTML = (_ops[f]||[]).map(([k,v])=>`<option value="${k}" ${k===op?'selected':''}>${v}</option>`).join('') }
  sf.onchange = updateOps
  const vi = document.createElement('input'); vi.type='number'; vi.style.cssText='padding:4px 6px;font-size:11px;width:80px'; vi.value = val||''
  if (fld==='upload_date' && op==='since_days') { const sp = document.createElement('span'); sp.textContent='天'; sp.style.cssText='font-size:11px;color:var(--text-muted)'; r.append(sf,so,vi,sp) }
  else r.append(sf,so,vi)
  const del = document.createElement('button'); del.textContent='×'; del.className='btn btn-ghost btn-xs'; del.onclick = () => r.remove(); r.append(del)
  updateOps()
  $('filter-rows').appendChild(r)
}
function getFilterRules() {
  const rules = []
  $('filter-rows').querySelectorAll('div').forEach(r => {
    const sels = r.querySelectorAll('select'); const inp = r.querySelector('input')
    if (sels.length>=2 && inp) rules.push({field:sels[0].value, op:sels[1].value, value:inp.value.includes('.')?parseFloat(inp.value):parseInt(inp.value)})
  })
  return rules
}
function setFilterRules(json) { $('filter-rows').innerHTML=''; try { JSON.parse(json||'[]').forEach(r => addFilterRow(r.field, r.op, r.value)) } catch(_){} }

/* Form */
function openForm() { $('sub-id').value=''; ['name','source_key','query','interval','cbz_max_pages','search_pages','download_dir'].forEach(k=>$(k).value=''); $('interval').value='1440'; $('cbz_max_pages').value='0'; $('search_pages').value='1'; $('use_global_search').checked=true; document.getElementById('query-label').textContent='查询串'; setFilterRules(''); $('form').classList.add('on') }
function closeForm() { $('form').classList.remove('on') }
function onModeChange() {
  const isSearch = $('mode').value === 'SEARCH'
  document.getElementById('query-label').textContent = isSearch ? '查询串' : '画廊URL'
  document.querySelectorAll('.search-only').forEach(el => el.style.display = isSearch ? '' : 'none')
}
function updateSortForm() {
  const key = $('source_key').value
  const s = window._srcs?.find(x => x.key === key)
  const opts = s?.sort_options || []
  $('sort').innerHTML = opts.length ? opts.map(o => `<option value="${o.value}">${o.label}</option>`).join('') : '<option value="">(无)</option>'
}

async function editSub(id) {
  const s = await api('/api/subscriptions/'+id); $('sub-id').value = id
  for (const k of ['name','source_key','query','mode','interval_minutes','cbz_max_pages','search_pages','download_dir']) $(k==='interval_minutes'?'interval':k).value = s[k] ?? ''
  updateSortForm(); $('sort').value = s.sort || 'date'
  document.getElementById('query-label').textContent = s.mode === 'SPECIFIC_GALLERY' ? '画廊URL' : '查询串'
  onModeChange()
  setFilterRules(s.filter_rules || '')
  $('use_global_search').checked = s.use_global_search !== false
  $('enabled').checked = s.enabled; $('form').classList.add('on')
}
async function saveSub() {
  let id = $('sub-id').value; const body = {
    name: $('name').value, source_key: $('source_key').value, query: $('query').value,
    mode: $('mode').value, interval_minutes: parseInt($('interval').value)||360,
    cbz_max_pages: parseInt($('cbz_max_pages').value)||0, search_pages: parseInt($('search_pages').value)||1, sort: $('sort').value||'date',
    download_dir: $('download_dir').value, use_global_search: $('use_global_search').checked, enabled: $('enabled').checked,
    filter_rules: JSON.stringify(getFilterRules()),
  }
  const isNew = !id
  try {
    if (id) {
      await api('/api/subscriptions/'+id, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
    } else {
      const r = await api('/api/subscriptions', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
      id = r.id
    }
    closeForm(); load()
    if (isNew) checkSub(id)
  } catch(e) {
    alert('保存失败: ' + e.message)
  }
}
async function delSub(id) { if (confirm('确认删除？')) { await api('/api/subscriptions/'+id, {method:'DELETE'}); load() } }

/* Results */
async function checkSub(id, loadMore=false) {
  if (!loadMore) {
    // 首次检查：显示加载状态
    clearTimeout(_chainTimer)
    _checkGen++
    $('res-title').textContent = '检查中…'
    $('res-meta').textContent = ''
    $('res-body').innerHTML = '<div class="empty-state"><div class="icon">&hellip;</div><h3>正在搜索</h3><p>请稍候…</p></div>'
    $('overlay').classList.add('on')
    $('sel-info').textContent = ''
    picked.clear(); results = []
    checkPage = 1; checkExcludeIds = []; checkTitles = []; checkNextUrl = ''
    checkPagesLoaded = 0; checkMaxPages = 5
  } else {
    $('load-more-btn').textContent = '加载中…'
    $('load-more-btn').disabled = true
  }
  const myGen = _checkGen

  try {
    const sub = await api('/api/subscriptions/'+id)
    if (myGen !== _checkGen) return
    $('res-meta').textContent = `${sub.name} · ${sub.source_key} · 查询: ${sub.query || '(空)'}`
    checkPagesLoaded++
    const keepGoing = checkPagesLoaded < checkMaxPages
    const body = {
      max_search_pages: 1, page: checkPage,
      exclude_ids: checkExcludeIds, existing_titles: checkTitles, next_url: checkNextUrl,
    }
    const r = await api('/api/subscriptions/'+id+'/check', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
    if (myGen !== _checkGen) return
    if (r.error) { $('res-title').textContent = '出错了'; $('res-body').innerHTML = '<div class="empty-state"><p>'+r.error+'</p></div>'; return }
    const newGals = r.new_galleries || []; current = r.subscription
    checkHasMore = r.has_more; checkPage = (r.current_page || checkPage + 1); checkNextUrl = r.next_url || ''

    // 收集去重信息
    newGals.forEach(g => { checkExcludeIds.push(g.native_id); checkTitles.push(g.title) })

    if (!loadMore) {
      results = newGals; picked.clear()
      $('res-title').textContent = '检查结果'
      $('res-body').innerHTML = newGals.length ? '' : '<div class="empty-state"><div class="icon">&para;</div><h3>没有新发现</h3><p>所有匹配的画廊都已下载</p></div>'
      load()  // 刷新下次检查时间
    } else {
      results = results.concat(newGals)
    }
    // 渲染卡片（追加或全量）
    if (newGals.length) {
      if (loadMore) $('res-body').querySelector('.empty-state')?.remove()
      const startIdx = results.length - newGals.length
      const html = newGals.map((g,i) => {
        const idx = startIdx + i
        return `<div class="g-card" id="gc-${idx}">
        <div class="cover" onclick="toggleCard('${g.native_id}',${idx})">
          ${g.cover_url ? `<img src="${g.cover_url}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
          <div class="no-img" style="${g.cover_url?'display:none':'display:flex'}">&mdash;</div>
          <div class="sel"></div>
        </div>
        <div class="info" onclick="openSource(event,'${g.web_url||''}')" style="cursor:pointer" title="在源站打开">
          <div class="gid">#${esc(g.native_id)}</div>
          <div class="title">${esc(g.title)}</div>
          <div class="meta"><span>${g.page_count} 页</span>${g.num_favorites?`<span class="dot"></span><span>${g.num_favorites} 收藏</span>`:''}</div>
          ${g.tags&&g.tags.length?`<div class="tags">${g.tags.slice(0,6).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>`:''}
        </div>
      </div>`
      }).join('')
      if (loadMore) {
        $('res-body').insertAdjacentHTML('beforeend', html)
      } else {
        $('res-body').innerHTML = html
      }
    }
    updateSel()
    $('load-more-btn').style.display = checkHasMore ? '' : 'none'
    $('load-more-btn').textContent = '加载更多'
    $('load-more-btn').disabled = false

    if (checkHasMore) {
      if (keepGoing)  // 自动链式加载
        _chainTimer = setTimeout(() => checkSub(current.id, true), 150)
      else 
        checkMaxPages += 5
    }
  } catch(e) {
    $('res-title').textContent = '出错了'
    $('res-body').innerHTML = '<div class="empty-state"><p style="color:var(--red)">'+e.message+'</p></div>'
  }
}

async function loadMore() {
  if (!current) return
  await checkSub(current.id, true)
}

function openSource(ev, url) {
  ev.stopPropagation()
  if (url) window.open(url, '_blank')
}

function toggleCard(id, idx) {
  picked.has(id) ? picked.delete(id) : picked.add(id)
  document.getElementById('gc-'+idx)?.classList.toggle('selected', picked.has(id))
  updateSel()
}
function toggleAll() {
  const all = results.length === picked.size
  all ? picked.clear() : results.forEach(g => picked.add(g.native_id))
  results.forEach((g,i) => document.getElementById('gc-'+i)?.classList.toggle('selected', !all))
  updateSel()
}
function updateSel() {
  $('sel-info').innerHTML = picked.size ? `已选 <strong>${picked.size}</strong> / ${results.length}` : '点选画廊卡片即可选择'
}

async function downloadPicked() {
  if (!picked.size) return
  const ids = [...picked], src = current.source_key
  const metas = {}
  ids.forEach(id => { const g = results.find(r => r.native_id === id); if (g) metas[id] = {title: g.title, cover_url: g.cover_url, web_url: g.web_url, page_count: g.page_count, new_page_ids: g.new_page_ids || [], replaces_native_id: g.replaces_native_id || ''} })
  api('/api/galleries/batch-download', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({source_key: src, gallery_ids: ids, gallery_metas: metas, subscription_id: current.id})
  }).catch(e => console.error(e))
  $('sel-info').textContent = `已提交 ${ids.length} 个下载，即将跳转…`
  setTimeout(() => { closeResults(); window.location.href = '/queue' }, 800)
}
function closeResults() { clearTimeout(_chainTimer); $('overlay').classList.remove('on') }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeResults() })

load()
</script>
{% endblock %}
