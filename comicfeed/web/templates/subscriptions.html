{% extends "base.html" %}
{% block content %}
<h2>订阅管理</h2>
<button class="btn-primary" onclick="showCreate()">+ 新建订阅</button>
<div id="list"><p>加载中...</p></div>

<form id="form" class="card" style="display:none">
    <input type="hidden" id="sub-id">
    <p><label>名称: <input id="name" required></label></p>
    <p><label>源: <select id="source_key"></select></label></p>
    <p><label>查询串: <input id="query" required></label></p>
    <p><label>模式: <select id="mode"><option>SEARCH</option><option>SPECIFIC_GALLERY</option></select></label></p>
    <p><label>排序: <select id="sort"><option value="date">最新</option><option value="popular-today">今日热门</option><option value="popular-week">本周热门</option><option value="popular">全部热门</option></select></label></p>
    <p><label>检查间隔(分钟): <input id="interval" type="number" value="360"></label></p>
    <p><label>CBZ分卷上限: <input id="cbz_max_pages" type="number" value="30"> (0=不分卷)</label></p>
    <p><label>启用: <input id="enabled" type="checkbox" checked></label></p>
    <button class="btn-primary" onclick="saveSub()">保存</button>
    <button type="button" onclick="hideForm()">取消</button>
</form>

<script>
async function api(path, opts={}) {
    const r = await fetch(path, opts)
    if (r.status === 204) return null
    return r.json()
}
async function load() {
    const subs = await api('/api/subscriptions')
    const srcs = await api('/api/sources')
    document.getElementById('source_key').innerHTML = srcs.map(s => `<option>${s.key}</option>`).join('')
    document.getElementById('list').innerHTML = subs.length === 0 ? '<p>暂无订阅</p>' :
        `<table><tr><th>名称</th><th>源</th><th>查询</th><th>间隔</th><th>状态</th><th>操作</th></tr>
        ${subs.map(s => `<tr>
            <td>${s.name}</td><td>${s.source_key}</td><td>${s.query}</td>
            <td>${s.interval_minutes}分</td>
            <td>${s.enabled ? '启用' : '停用'}</td>
            <td>
                <button class="btn-sm" onclick="editSub(${s.id})">编辑</button>
                <button class="btn-sm" onclick="checkSub(${s.id})">检查</button>
                <button class="btn-sm btn-danger" onclick="delSub(${s.id})">删除</button>
            </td>
        </tr>`).join('')}</table>`
}
async function showCreate() {
    document.getElementById('sub-id').value = ''
    document.getElementById('form').reset()
    document.getElementById('form').style.display = 'block'
}
function hideForm() { document.getElementById('form').style.display = 'none' }
async function editSub(id) {
    const sub = await api('/api/subscriptions/' + id)
    document.getElementById('sub-id').value = id
    document.getElementById('name').value = sub.name
    document.getElementById('source_key').value = sub.source_key
    document.getElementById('query').value = sub.query
    document.getElementById('mode').value = sub.mode
    document.getElementById('interval').value = sub.interval_minutes
    document.getElementById('cbz_max_pages').value = sub.cbz_max_pages
    document.getElementById('sort').value = sub.sort || 'date'
    document.getElementById('enabled').checked = sub.enabled
    document.getElementById('form').style.display = 'block'
}
async function saveSub() {
    const id = document.getElementById('sub-id').value
    const body = {
        name: document.getElementById('name').value,
        source_key: document.getElementById('source_key').value,
        query: document.getElementById('query').value,
        mode: document.getElementById('mode').value,
        interval_minutes: parseInt(document.getElementById('interval').value),
        cbz_max_pages: parseInt(document.getElementById('cbz_max_pages').value),
        sort: document.getElementById('sort').value,
        enabled: document.getElementById('enabled').checked,
    }
    if (id) await api('/api/subscriptions/' + id, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)})
    else await api('/api/subscriptions', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)})
    hideForm(); load()
}
async function checkSub(id) {
    const r = await api('/api/subscriptions/' + id + '/check', {method:'POST'})
    if (r.error) alert('检查失败: ' + r.error)
    else alert('发现 ' + r.new_galleries.length + ' 个新画廊:\n' + r.new_galleries.map(g => g.title).join('\n'))
}
async function delSub(id) {
    if (confirm('确认删除？')) { await api('/api/subscriptions/' + id, {method:'DELETE'}); load() }
}
load()
</script>
{% endblock %}
