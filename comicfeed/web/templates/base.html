<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComicFeed</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1d23;
            --card: #242830;
            --border: #2e323a;
            --text: #c8c0b4;
            --text-dim: #6b6560;
            --teal: #0ea5a0;
            --accent: #f0a500;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Geist', system-ui, sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh;
        }
        nav {
            display: flex; align-items: center; gap: 0.25rem;
            padding: 0 1.5rem; background: #14161a;
            border-bottom: 1px solid var(--border); height: 50px;
        }
        nav .brand {
            font-family: 'Instrument Serif', Georgia, serif; font-style: italic;
            font-size: 1.2rem; color: #e8e0d5; margin-right: 1.5rem; letter-spacing: 0.02em;
        }
        nav a {
            color: var(--text-dim); text-decoration: none; padding: 0.5rem 0.85rem;
            border-radius: 6px; font-size: 0.84rem; font-weight: 500; transition: all 0.15s;
        }
        nav a:hover, nav a.active { color: #e8e0d5; background: var(--card); }
        .container { max-width: 1100px; margin: 1.5rem auto; padding: 0 1.25rem; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body>
    <nav>
        <span class="brand">ComicFeed</span>
        <a href="/">订阅</a>
        <a href="/sources">源管理</a>
        <a href="/galleries">画廊</a>
        <a href="/queue">队列</a>
        <a href="/settings">设置</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
