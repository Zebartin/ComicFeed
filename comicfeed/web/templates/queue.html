{% extends "base.html" %}
{% block content %}
<h2>下载队列</h2>
<div id="list"><p>加载中...</p></div>
<script>
async function load() {
    const r = await fetch('/api/queue')
    const data = await r.json()
    if (data.active.length === 0) {
        document.getElementById('list').innerHTML = '<p>无进行中的下载</p>'
    } else {
        document.getElementById('list').innerHTML = '<table><tr><th>Gallery ID</th><th>标题</th><th>进度</th></tr>' +
            data.active.map(t => `<tr>
                <td>${t.gallery_id}</td><td>${t.title}</td>
                <td>${t.downloaded}/${t.total_pages} (${Math.round(t.downloaded/t.total_pages*100)}%)</td>
            </tr>`).join('') + '</table>'
    }
    setTimeout(load, 2000)
}
load()
</script>
{% endblock %}
